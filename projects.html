<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Semua Proyek | Portofolio Andaru</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-secondary-page">
    
    <nav class="navbar">
        <div class="logo"><a href="index.html" style="text-decoration:none; color:inherit;">Portofolio <span>Andaru</span></a></div>
        <a href="index.html" class="btn-back">← Kembali ke Home</a>
    </nav>

    <section class="container" style="margin-top: 120px; padding: 0 10%; min-height: 80vh;">
        <div style="text-align: center; margin-bottom: 50px;">
            <h1 style="font-size: 2.5rem; margin-bottom: 10px;">Project <span class="highlight">Showcase</span></h1>
            <p style="color: var(--text-muted);">Eksplorasi kumpulan proyek IoT, Machine Learning, dan Sistem Tertanam yang pernah saya kerjakan.</p>
        </div>

        <div id="projects-grid" class="projects-grid"></div>
    </section>

    <script src="projects-data.js"></script>
    <script>
        const grid = document.getElementById('projects-grid');

        // Render SEMUA proyek dari projects-data.js
        projectsData.forEach(project => {
            const card = document.createElement('div');
            card.className = 'project-card';
            
            // 1. Tambahkan logika Label Status (On-going)
            const statusBadge = project.status ? `<span class="badge-status">${project.status}</span>` : '';

            const projectImages = project.images ? project.images : [project.image];
            let imagesHTML = '';
            projectImages.forEach((img, index) => {
                imagesHTML += `<img src="${img}" class="${index === 0 ? 'active' : ''}" alt="${project.title}">`;
            });

            card.innerHTML = `
                <div class="card-image-container" id="all-slider-${project.id}">
                    <span class="card-badge">${project.category}</span>
                    ${statusBadge} ${imagesHTML}
                </div>
                <div class="card-content">
                    <h3>${project.title}</h3>
                    <p>${project.description}</p>
                    <a href="project-detail.html?id=${project.id}" class="btn-detail">Lihat Detail ➔</a>
                </div>
            `;
            grid.appendChild(card);

            // Logika Auto-Slide untuk setiap kartu
            if (projectImages.length > 1) {
                let currentImgIndex = 0;
                const sliderContainer = card.querySelector(`#all-slider-${project.id}`);
                const images = sliderContainer.querySelectorAll('img');
                
                setInterval(() => {
                    images[currentImgIndex].classList.remove('active');
                    currentImgIndex = (currentImgIndex + 1) % images.length;
                    images[currentImgIndex].classList.add('active');
                }, 3000); 
            }
        });
    </script>
</body>
</html>
