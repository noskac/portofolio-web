<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detail Proyek | Portofolio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="detail-page">
    <nav class="navbar">
        <div class="logo"><a href="index.html" style="text-decoration:none; color:inherit;">Portofolio <span>Andaru</span></a></div>
        <a href="projects.html" class="btn-back">← Kembali ke Proyek</a>
    </nav>

    <div id="project-container" class="container" style="margin-top: 100px; padding: 0 10% 50px;">
        <h1 id="p-title" style="margin-bottom: 10px;">Memuat...</h1>
        <span id="p-category" class="badge">Category</span>

        <div class="slider-container">
            <div id="p-slider" class="slider-wrapper">
                </div>
            <button class="slider-btn prev" onclick="changeSlide(-1)">❮</button>
            <button class="slider-btn next" onclick="changeSlide(1)">❯</button>
        </div>
        
        <div class="project-info">
            <h3>Teknologi yang Digunakan:</h3>
            <div id="p-tech" class="tech-tags"></div>
            
            <h3>Deskripsi Proyek:</h3>
            <p id="p-story" style="white-space: pre-line; margin-bottom: 30px;"></p>
            
            <div class="direct-links" style="padding: 20px; background: var(--bg-secondary); border-radius: 12px; border: 1px solid #e2e8f0;">
                <h3 style="margin-bottom: 15px;">Tautan Langsung:</h3>
                <div style="display: flex; gap: 15px; flex-wrap: wrap;">
                    <a id="p-github" href="#" target="_blank" class="btn btn-primary">Lihat di GitHub</a>
                    <a id="p-tinkercad" href="#" target="_blank" class="btn btn-secondary" style="border-color: #f59e0b; color: #b45309;">Logic Wiring (Tinkercad)</a>
                </div>
            </div>
        </div>
    </div>

    <script src="projects-data.js"></script>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const projectId = urlParams.get('id');
        const project = projectsData.find(p => p.id === projectId);

        let currentSlide = 0;

        if (project) {
            document.getElementById('p-title').innerText = project.title;
            document.getElementById('p-category').innerText = project.category;
            document.getElementById('p-story').innerText = project.fullStory;
            document.getElementById('p-github').href = project.githubLink;
            
            // Link Tinkercad (Sembunyikan jika tidak ada)
            const tcLink = document.getElementById('p-tinkercad');
            if(project.tinkercadLink) {
                tcLink.href = project.tinkercadLink;
            } else {
                tcLink.style.display = 'none';
            }

            // Render Slider
            const sliderWrapper = document.getElementById('p-slider');
            project.images.forEach((imgSrc, index) => {
                const img = document.createElement('img');
                img.src = imgSrc;
                img.className = index === 0 ? 'active' : '';
                sliderWrapper.appendChild(img);
            });

            // Render Tech Tags
            const techContainer = document.getElementById('p-tech');
            project.techStack.forEach(tech => {
                const span = document.createElement('span');
                span.className = 'tech-badge';
                span.innerText = tech;
                techContainer.appendChild(span);
            });
        }

        function changeSlide(direction) {
            const images = document.querySelectorAll('#p-slider img');
            images[currentSlide].classList.remove('active');
            
            currentSlide = (currentSlide + direction + images.length) % images.length;
            
            images[currentSlide].classList.add('active');
        }
    </script>
</body>
</html>
